<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timer Board</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-top">
      <h1>⏱ Timer Board</h1>
      <div class="header-actions">
        <button id="theme-toggle" class="btn-theme-toggle" title="Cambiar tema">☀</button>
      </div>
    </div>
    <div class="header-bottom">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="search-input" type="text" placeholder="Buscar tarjeta… (Ctrl+F)" autocomplete="off" />
        <button id="search-clear" class="btn-search-clear" hidden>✕</button>
      </div>
      <div id="tag-filters" class="tag-filters">
        <button class="tag-filter-btn active" data-filter-tag="">Todas</button>
        <button class="tag-filter-btn" data-filter-tag="bug"    >#bug</button>
        <button class="tag-filter-btn" data-filter-tag="feature">#feature</button>
        <button class="tag-filter-btn" data-filter-tag="meeting">#meeting</button>
        <button class="tag-filter-btn" data-filter-tag="review" >#review</button>
        <button class="tag-filter-btn" data-filter-tag="test"   >#test</button>
        <button class="tag-filter-btn" data-filter-tag="fix"    >#fix</button>
      </div>
    </div>
  </header>

  <main>
    <div id="board" class="board"></div>
  </main>
  <script src="app.js"></script>
</body>
</html>
