<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timer Board</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-top">
      <h1>⏱ Timer Board</h1>
      <div class="header-actions">
        <button id="sidebar-toggle" class="btn-sidebar-toggle" title="Tablones">☰</button>
        <a href="https://github.com/jfarres-dev/Timers" target="_blank" class="btn-github" title="Repositorio en GitHub">
          <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
        </a>
        <button id="theme-toggle" class="btn-theme-toggle" title="Cambiar tema">☀</button>
      </div>
    </div>
    <div class="header-bottom">
      <div id="tag-filters" class="tag-filters">
        <button class="tag-filter-btn active" data-filter-tag="">Todas</button>
        <button class="tag-filter-btn" data-filter-tag="bug"    >#bug</button>
        <button class="tag-filter-btn" data-filter-tag="feature">#feature</button>
        <button class="tag-filter-btn" data-filter-tag="meeting">#meeting</button>
        <button class="tag-filter-btn" data-filter-tag="review" >#review</button>
        <button class="tag-filter-btn" data-filter-tag="test"   >#test</button>
        <button class="tag-filter-btn" data-filter-tag="fix"    >#fix</button>
      </div>
    </div>
  </header>

  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <main class="app-layout">
    <aside id="boards-sidebar" class="boards-sidebar"></aside>
    <div id="board" class="board"></div>
  </main>
  <div id="card-modal" class="modal-backdrop">
    <div class="modal-box">
      <div class="modal-header">
        <input class="modal-title-input" placeholder="Nombre del timer…" />
        <button class="modal-close" title="Cerrar">✕</button>
      </div>
      <div class="modal-tag-picker"></div>
      <div class="modal-time-editor" id="modal-time-editor" hidden>
        <span class="modal-time-label">Tiempo registrado</span>
        <div class="modal-time-inputs">
          <input type="number" class="modal-time-h" min="0" max="9999" placeholder="0" />
          <span>h</span>
          <input type="number" class="modal-time-m" min="0" max="59" placeholder="0" />
          <span>m</span>
          <input type="number" class="modal-time-s" min="0" max="59" placeholder="0" />
          <span>s</span>
        </div>
      </div>
      <textarea class="modal-notes" placeholder="Notas..."></textarea>
      <div class="modal-footer">
        <button class="modal-btn-delete">Eliminar timer</button>
        <button class="modal-btn-save">Guardar</button>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
