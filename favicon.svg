<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Body of stopwatch -->
  <circle cx="16" cy="19" r="11" fill="#4f9cf9"/>
  <circle cx="16" cy="19" r="8.5" fill="#0f1117"/>
  <!-- Minute hand (green) -->
  <line x1="16" y1="19" x2="16" y2="13" stroke="#4ade80" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Hour hand (white) -->
  <line x1="16" y1="19" x2="20" y2="21" stroke="#e2e8f0" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="19" r="1.3" fill="white"/>
  <!-- Crown -->
  <rect x="13.5" y="5.5" width="5" height="3" rx="1.5" fill="#4f9cf9"/>
  <!-- Crown buttons -->
  <line x1="11" y1="6" x2="9" y2="4" stroke="#4f9cf9" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="21" y1="6" x2="23" y2="4" stroke="#4f9cf9" stroke-width="1.8" stroke-linecap="round"/>
</svg>
